<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Excel Price List Search</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#ffffff" />
</head>

<body>
  <main class="app">
    <h1>Excel Price List Search</h1>
    <p class="subtitle">
      Upload an Excel file, search any column, and view the full row details.
    </p>

    <section class="card">
      <label for="excelFile">Upload Excel File (.xlsx only)</label>
      <input type="file" id="excelFile" accept=".xlsx" />
    </section>

    <section class="card hidden" id="controlsSection">
      <label for="sheetSelect">Select Sheet</label>
      <select id="sheetSelect"></select>

      <label for="searchInput">Search</label>
      <input
        type="text"
        id="searchInput"
        placeholder="Search product code, name, price, brand..."
      />

      <label for="columnSelect">Search In</label>
      <select id="columnSelect">
        <option value="__ALL__">All columns</option>
      </select>

      <button id="downloadCsvBtn">Download Filtered Results CSV</button>
    </section>

    <section class="card hidden" id="statusSection">
      <p id="statusText"></p>
    </section>

    <section class="card hidden" id="resultsSection">
      <h2>Results</h2>
      <div class="table-wrapper">
        <table id="resultsTable"></table>
      </div>
    </section>

    <section class="card hidden" id="detailsSection">
      <h2>Row Details</h2>
      <p class="subtitle">Click any result row to see full information.</p>
      <div id="rowDetails"></div>
    </section>
  </main>

  <script src="xlsx.full.min.js"></script>
  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
